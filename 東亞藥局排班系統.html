    id: '產假', label: '產假', color: '#c06090', bg: '#f8e8f5', border: '#e0a0d0',
    law: '勞基法第50條',
    desc: '分娩前後給予8週（全薪）；懷孕未滿3個月流產給予1週；3個月以上未滿7個月流產給予4週。',
    needReason: true, needAttachment: true, unit: '週'
  },
];

function getLeaveTypeDef(id) {
  return LEAVE_TYPES.find(t => t.id === id);
}

function renderLeave() {
  const today = new Date();
  const todayY = today.getFullYear(), todayM = today.getMonth() + 1, todayD = today.getDate();

  const y = S.year, m = S.month, roc = y - 1911;
  const emps = S.data?.employees || [];
  const id   = S.staffId;
  const emp  = emps.find(e => e.id === id);
  if (!emp) return '<div style="padding:24px;color:var(--text3);">找不到員工資料</div>';

  const existing = S.leaveRequests.filter(r => r.empId === id);
  const draft = S.leaveDraft;
  const mode  = draft?.mode || null;

  // ── 排休日曆（次月，25日前） ──
  const paiqiuOpen = todayD <= 25;
  const nextM = todayM + 1 > 12 ? 1  : todayM + 1;
  const nextY = todayM + 1 > 12 ? todayY + 1 : todayY;

  const dim = new Date(nextY, nextM, 0).getDate();
  const weekHeader = ['一','二','三','四','五','六','日'].map(w =>
    `<div style="text-align:center;font-size:11px;font-weight:700;color:#aaa;padding:4px 0;">${w}</div>`
  ).join('');
  const firstWd = new Date(nextY, nextM - 1, 1).getDay();
  const offsetDays = firstWd === 0 ? 6 : firstWd - 1;
  const emptyPads = Array(offsetDays).fill('<div></div>').join('');

  const paiqiuReqs = existing.filter(r => r.year === nextY && r.month === nextM && r.leaveType === '排休');
  const dateCells = Array.from({length: dim}, (_, i) => {
    const d = i + 1;
    const req = paiqiuReqs.find(r => r.date === d);
    const isSelected = draft?.mode === 'paiqiu' && draft?.date === d;
    let bg = '#fff', border = '1px solid #e0e0e0', color = '#333', label = '';
    if (req) {
      if (req.status === 'approved')      { bg='#d0f5ee'; border='1.5px solid #80d9cc'; label='✓'; color='#007a60'; }
      else if (req.status === 'rejected') { bg='#ffe0e0'; border='1.5px solid #f5a0a0'; label='✗'; color='#cc3333'; }
      else { bg='#fff4cc'; border='1.5px solid #f0d040'; label='待'; color='#7a5c00'; }
    } else if (isSelected) {
      bg='#e0eeff'; border='2px solid #3a6ea8'; color='#3a6ea8';
    }
    const canClick = !req && paiqiuOpen;
    return `<div onclick="${canClick ? `selectPaiqiuDate(${d})` : ''}"
      style="cursor:${canClick?'pointer':'default'};padding:6px 2px;text-align:center;border-radius:8px;
        background:${bg};border:${border};user-select:none;opacity:${!paiqiuOpen&&!req?'0.4':'1'};">
      <div style="font-size:13px;font-weight:700;color:${color};">${d}</div>
      ${label ? `<div style="font-size:9px;font-weight:700;color:${color};">${label}</div>` : ''}
    </div>`;
  }).join('');

  // 排休申請面板
  let paiqiuPanel = '';
  if (draft?.mode === 'paiqiu' && draft?.date) {
    const dt = new Date(nextY, nextM - 1, draft.date);
    const wdStr = ['日','一','二','三','四','五','六'][dt.getDay()];
    const slots = draft.slots || {早:true,午:true,晚:true};
    const allOn = slots['早'] && slots['午'] && slots['晚'];
    const slotBtn = (lbl) => {
      const on = !!slots[lbl];
      return `<button onclick="S.leaveDraft.slots['${lbl}']=!S.leaveDraft.slots['${lbl}'];renderCur();"
        style="flex:1;padding:10px 4px;border-radius:9px;border:2px solid ${on?'#3a6ea8':'#ddd'};
          background:${on?'#3a6ea8':'#fff'};color:${on?'#fff':'#aaa'};
          font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;">${lbl}</button>`;
    };
    paiqiuPanel = `
    <div style="background:#fff;border:2px solid #3a6ea8;border-radius:12px;padding:16px;margin-bottom:12px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
        <button onclick="S.leaveDraft={mode:'paiqiu',slots:{早:true,午:true,晚:true}};renderCur();"
          style="padding:5px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-family:inherit;color:#666;">← 返回</button>
        <div style="font-size:15px;font-weight:800;color:#3a6ea8;">${nextM}月${draft.date}日（${wdStr}）排休</div>
      </div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:8px;">選擇休假時段（可複選）</div>
      <div style="display:flex;gap:8px;margin-bottom:8px;">
        <button onclick="S.leaveDraft.slots={早:true,午:true,晚:true};renderCur();"
          style="flex:1;padding:10px 4px;border-radius:9px;border:2px solid ${allOn?'#3a6ea8':'#ddd'};
            background:${allOn?'#3a6ea8':'#fff'};color:${allOn?'#fff':'#aaa'};
            font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">全天</button>
        ${slotBtn('早')}${slotBtn('午')}${slotBtn('晚')}
      </div>
      <div style="display:flex;gap:8px;">

        <button onclick="submitPaiqiu()"
          style="flex:2;padding:9px;border:none;border-radius:8px;background:#3a6ea8;color:#fff;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;">送出排休申請</button>
      </div>
    </div>`;
  }

  // ── 請假申請面板 ──
  let leavePanel = '';
  if (draft?.mode === 'leave') {
    const typeDef = draft.leaveTypeId ? getLeaveTypeDef(draft.leaveTypeId) : null;
    const typeOptions = LEAVE_TYPES.map(t =>
      `<option value="${t.id}" ${draft.leaveTypeId===t.id?'selected':''}>${t.label}</option>`
    ).join('');
    const typeSelect = `<select onchange="S.leaveDraft.leaveTypeId=this.value;renderCur();"
      style="width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;
        font-size:14px;font-family:inherit;color:var(--text);background:#fff;cursor:pointer;">
      <option value="">-- 請選擇假別 --</option>
      ${typeOptions}
    </select>`;

    let typeInfo = '', subTypeBlock = '', dateBlock = '', reasonBlock = '', attachBlock = '', submitBtn = '';

    if (typeDef) {
      typeInfo = `<div style="background:${typeDef.bg};border:1px solid ${typeDef.border};border-radius:8px;
          padding:10px 12px;margin-bottom:12px;font-size:12px;color:${typeDef.color};line-height:1.7;">
        <b>${typeDef.law}</b>　${typeDef.desc}
      </div>`;

      if (typeDef.subTypes) {
        subTypeBlock = `<div style="margin-bottom:12px;">
          <div style="font-size:12px;color:var(--text3);margin-bottom:6px;">關係別（天數）</div>
          <div style="display:flex;flex-direction:column;gap:6px;">
            ${typeDef.subTypes.map(st => {
              const active = draft.subType === st.label;
              return `<button onclick="S.leaveDraft.subType='${st.label}';S.leaveDraft.maxDays=${st.days};renderCur();"
                style="padding:8px 12px;border-radius:8px;border:1.5px solid ${active?'#444':'#ddd'};
                  background:${active?'#f5f5f5':'#fff'};color:${active?'#222':'#888'};
                  font-size:13px;font-weight:${active?'700':'400'};cursor:pointer;font-family:inherit;text-align:left;">
                ${st.label}　<span style="color:#3a6ea8;font-weight:700;">${st.days} 天</span>
              </button>`;
            }).join('')}
          </div>
        </div>`;
      }

      dateBlock = `<div style="margin-bottom:12px;">
        <div style="font-size:12px;color:var(--text3);margin-bottom:6px;">請假日期 <span style="color:#cc3333;">*必填</span></div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <input type="date" id="leave-start" value="${draft.startDate||''}"
            onchange="S.leaveDraft.startDate=this.value;if(!S.leaveDraft.endDate)S.leaveDraft.endDate=this.value;renderCur();"
            style="padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;">
          <span style="color:var(--text3);font-size:13px;">至</span>
          <input type="date" id="leave-end" value="${draft.endDate||draft.startDate||''}"
            onchange="S.leaveDraft.endDate=this.value;renderCur();"
            style="padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;">
        </div>
        ${(draft.startDate && draft.endDate) ? (() => {
          const s = new Date(draft.startDate), e = new Date(draft.endDate);
          const diffDays = Math.round((e - s) / (1000*60*60*24)) + 1;
          const maxD = draft.maxDays || typeDef.totalDays;
          const warn = maxD && diffDays > maxD ? `<span style="color:#cc3333;font-size:11px;margin-left:8px;">⚠ 超過上限 ${maxD} 天</span>` : '';
          return `<div style="font-size:12px;color:#3a6ea8;margin-top:6px;">共 ${diffDays} 天${warn}</div>`;
        })() : ''}
      </div>`;

      reasonBlock = `<div style="margin-bottom:12px;">
        <div style="font-size:12px;color:var(--text3);margin-bottom:6px;">請假原因 <span style="color:#cc3333;">*必填</span></div>
        <textarea id="leave-reason" placeholder="請填寫請假原因…" rows="3"
          onchange="S.leaveDraft.reason=this.value;"
          style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;resize:none;box-sizing:border-box;">${draft.reason||''}</textarea>
      </div>`;

      const needAtt = typeDef.needAttachment;
      attachBlock = `<div style="margin-bottom:12px;">
        <div style="font-size:12px;color:var(--text3);margin-bottom:6px;">
          附件證明${needAtt ? '<span style="color:#cc3333;"> *必填</span>' : '（選填）'}
        </div>
        <label style="display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border:1.5px dashed #aaa;
          border-radius:8px;cursor:pointer;font-size:13px;color:#555;background:#fafafa;">
          📎 選擇檔案
          <input type="file" id="leave-attachment" multiple accept="image/*,.pdf"
            onchange="updateAttachLabel(this)" style="display:none;">
        </label>
        <span id="attach-label" style="font-size:12px;color:#3a6ea8;margin-left:8px;">${draft.attachNames||''}</span>
      </div>`;

      submitBtn = `<div style="display:flex;gap:8px;margin-top:4px;">
        <button onclick="S.leaveDraft.leaveTypeId=null;renderCur();"
          style="flex:1;padding:9px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-family:inherit;">← 重選假別</button>
        <button onclick="submitLeaveRequest()"
          style="flex:2;padding:9px;border:none;border-radius:8px;background:${typeDef.color};color:#fff;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;">送出請假申請</button>
      </div>`;
    }

    leavePanel = `
    <div style="background:#fff;border:2px solid #8c6200;border-radius:12px;padding:16px;margin-bottom:12px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
        <button onclick="S.leaveDraft=null;renderCur();"
          style="padding:5px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-family:inherit;color:#666;">← 返回</button>
        <div style="font-size:15px;font-weight:800;color:#8c6200;">${draft.leaveTypeId ? getLeaveTypeDef(draft.leaveTypeId)?.label || '請假申請' : '請假申請'}</div>
      </div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:6px;">假別</div>
      <div style="margin-bottom:12px;">${typeSelect}</div>
      ${typeInfo}${subTypeBlock}${dateBlock}${reasonBlock}${attachBlock}${submitBtn}

    </div>`;
  }

  // 申請紀錄（全部月份）
  const allReqs = existing.slice().sort((a,b) => {
    const da = a.startDate || `${a.year}-${String(a.month).padStart(2,'0')}-${String(a.date||0).padStart(2,'0')}`;
    const db = b.startDate || `${b.year}-${String(b.month).padStart(2,'0')}-${String(b.date||0).padStart(2,'0')}`;
    return db.localeCompare(da);
  });
  const history = allReqs.length
    ? allReqs.map(r => {
        const stColor = r.status==='approved'?'#007a60':r.status==='rejected'?'#cc3333':'#7a5c00';
        const stBg    = r.status==='approved'?'#d0f5ee':r.status==='rejected'?'#ffe0e0':'#fff4cc';
        const stLabel = r.status==='approved'?'✓ 已核准':r.status==='rejected'?'✗ 已拒絕':'⏳ 待審核';
        const typeDef2 = getLeaveTypeDef(r.leaveType);
        const typeColor = typeDef2?.color || '#666';
        const typeBg2   = typeDef2?.bg    || '#f5f5f5';
        const dateStr = r.startDate
          ? `${r.startDate}${r.endDate&&r.endDate!==r.startDate?' ～ '+r.endDate:''}`
          : `${r.year}/${r.month}/${r.date}（${r.weekday}）`;
        const slotsStr = r.slots ? r.slots.join('・') : '';
        return `<div style="padding:9px 12px;background:#fff;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:${r.reason?'4':'0'}px;">
            <span style="font-size:13px;font-weight:700;">${dateStr}</span>
            <span style="font-size:11px;background:${typeBg2};color:${typeColor};padding:2px 7px;border-radius:6px;font-weight:700;">${r.leaveType}</span>
            ${slotsStr?`<span style="font-size:11px;color:#3a6ea8;">${slotsStr}</span>`:''}
            <span style="font-size:11px;color:${stColor};background:${stBg};padding:2px 8px;border-radius:8px;font-weight:700;margin-left:auto;">${stLabel}</span>
            ${r.status==='pending'
              ? `<button onclick="cancelLeave('${r.id}')" style="font-size:11px;padding:3px 10px;border:1px solid #ffaaaa;border-radius:6px;cursor:pointer;background:#fff5f5;color:#cc3333;font-family:inherit;font-weight:700;">撤回</button>`
              : r.status==='approved'
                ? `<span style="font-size:11px;color:#aaa;">已核准，如需異動請聯絡管理者</span>`
                : `<span style="font-size:11px;color:#cc3333;">已拒絕</span>`
            }
          </div>
          ${r.reason?`<div style="font-size:12px;color:#888;">原因：${r.reason}</div>`:''}
          ${r.attachNames?`<div style="font-size:11px;color:#3a6ea8;">📎 ${r.attachNames}</div>`:''}
        </div>`;
      }).join('')
    : '<div style="color:var(--text3);font-size:13px;padding:8px 0;">尚無申請紀錄</div>';

  // 入口按鈕
  const entryBtns = !mode ? `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">
      ${paiqiuOpen
        ? `<button onclick="S.leaveDraft={mode:'paiqiu',slots:{早:true,午:true,晚:true}};renderCur();"
            style="padding:18px 12px;border-radius:12px;border:2px solid #3a6ea8;background:#e8f0ff;color:#3a6ea8;
              font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;">
            排休<div style="font-size:11px;font-weight:400;margin-top:4px;color:#666;">申請 ${nextY-1911}/${nextM} 月｜選日期選時段</div>
          </button>`
        : `<div style="padding:18px 12px;border-radius:12px;border:2px solid #ddd;background:#f8f8f8;color:#bbb;
              font-size:14px;font-weight:700;font-family:inherit;text-align:center;">
            排休<div style="font-size:11px;font-weight:400;margin-top:4px;">每月25日後關閉申請</div>
          </div>`
      }
      <button onclick="S.leaveDraft={mode:'leave'};renderCur();"
        style="padding:18px 12px;border-radius:12px;border:2px solid #8c6200;background:#fff8ee;color:#8c6200;
          font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;">
        請假<div style="font-size:11px;font-weight:400;margin-top:4px;color:#666;">特休／病假／婚喪假等</div>
      </button>
    </div>` : '';

  return `
    <div style="margin-bottom:16px;">
      <div style="font-size:20px;font-weight:800;color:var(--text);">假勤申請</div>
    </div>
    ${entryBtns}
    ${paiqiuPanel}
    ${leavePanel}
    ${mode==='paiqiu' ? `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
      <button onclick="S.leaveDraft=null;renderCur();"
        style="padding:5px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-family:inherit;color:#666;">← 返回</button>
      <div style="font-size:14px;font-weight:700;color:#3a6ea8;">${nextY-1911}年${nextM}月 排休日曆</div>
    </div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:8px;">點擊日期選取</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;">${weekHeader}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px;">${emptyPads}${dateCells}</div>
    ` : ''}
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
      <div style="font-size:13px;font-weight:700;color:var(--text);">申請紀錄</div>
    </div>
    ${history}`;
}


function selectPaiqiuDate(d) {
  if (S.leaveDraft?.date === d) {
    S.leaveDraft = { mode: 'paiqiu', slots: {早:true,午:true,晚:true} };
  } else {
    S.leaveDraft = { mode: 'paiqiu', date: d, slots: {早:true,午:true,晚:true} };
  }
  renderCur();
}

function selectLeaveDate(d) { selectPaiqiuDate(d); }
function toggleLeaveDate(d) { selectPaiqiuDate(d); }

function updateAttachLabel(input) {
  const names = Array.from(input.files).map(f=>f.name).join(', ');
  document.getElementById('attach-label').textContent = names;
  if (S.leaveDraft) S.leaveDraft.attachNames = names;
}

function submitPaiqiu() {
  const draft = S.leaveDraft;
  // 驗證：25日前才可申請
  const now = new Date();
  if (now.getDate() > 25) { showToast('每月25日後已關閉排休申請', 'err'); return; }
  if (!draft?.date) { showToast('請先點選日期', 'err'); return; }
  const slots = Object.keys(draft.slots||{}).filter(k=>draft.slots[k]);
  if (!slots.length) { showToast('請至少選擇一個時段', 'err'); return; }
  // 取次月年月（排休日曆固定顯示次月）
  const nextM = now.getMonth()+2>12?1:now.getMonth()+2;
  const nextY = now.getMonth()+2>12?now.getFullYear()+1:now.getFullYear();
  const y=nextY, m=nextM, d=draft.date, id=S.staffId;
  const dt = new Date(y,m-1,d);
  const req = {
    id: id+'_'+y+m+d+'_pq_'+Date.now(),
    empId:id, empName:S.staffName,
    year:y, month:m, date:d,
    weekday: WD[dt.getDay()],
    leaveType:'排休', slots, status:'pending',
    submittedAt: new Date().toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})
  };
  S.leaveRequests = S.leaveRequests.filter(r=>!(r.empId===id&&r.year===y&&r.month===m&&r.date===d&&r.leaveType==='排休'));
  S.leaveRequests.push(req);
  saveLeaveRequests();
  S.leaveDraft = { mode:'paiqiu', slots:{早:true,午:true,晚:true} };
  showToast('✓ 已送出 '+nextY+'/'+(nextM<10?'0'+nextM:nextM)+'/'+d+' 排休申請（'+slots.join('・')+'）', 'ok');
  updateRequestBadge();
  renderCur();
}

function submitLeaveRequest() {
  const draft = S.leaveDraft;
  const typeDef = getLeaveTypeDef(draft?.leaveTypeId);
  if (!typeDef) { showToast('請選擇假別', 'err'); return; }
  if (!draft.startDate) { showToast('請選擇請假開始日期', 'err'); return; }
  if (typeDef.needReason) {
    const reason = document.getElementById('leave-reason')?.value?.trim();
    if (!reason) { showToast('請填寫請假原因', 'err'); return; }
    draft.reason = reason;
  }
  if (typeDef.needAttachment && !draft.attachNames) {
    showToast('此假別需附上證明文件', 'err'); return;
  }
  if (typeDef.subTypes && !draft.subType) {
    showToast('請選擇關係別', 'err'); return;
  }
  const y=S.year, m=S.month, id=S.staffId;
  const req = {
    id: id+'_'+y+m+'_lv_'+Date.now(),
    empId:id, empName:S.staffName,
    year:y, month:m, date:null,
    weekday:'', leaveType:draft.leaveTypeId,
    startDate:draft.startDate, endDate:draft.endDate||draft.startDate,
    subType:draft.subType||'',
    reason:draft.reason||'',
    attachNames:draft.attachNames||'',
    status:'pending',
    submittedAt: new Date().toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})
  };
  S.leaveRequests.push(req);
  saveLeaveRequests();
  S.leaveDraft = null;
  showToast('✓ 已送出'+draft.leaveTypeId+'申請，等待管理者審核', 'ok');
  updateRequestBadge();
  renderCur();
}

function submitLeave() { submitPaiqiu(); }

function cancelLeave(id) {
  const req = S.leaveRequests.find(r => r.id === id);
  if (!req) return;
  if (req.status === 'approved') { showToast('已核准的假單無法撤回，請聯絡管理者', 'err'); return; }
  showConfirm('確定撤回此假單？撤回後可重新申請。', function() {
    S.leaveRequests = S.leaveRequests.filter(r => r.id !== id);
    saveLeaveRequests();
    updateRequestBadge();
    showToast('✓ 假單已撤回', 'ok');
    renderCur();
  }, '撤回假單');
}

function clearMonthLeave(year, month) {
  showConfirm('確定清除 ' + (year-1911) + '年' + month + '月 的所有假單？', function() {
    S.leaveRequests = S.leaveRequests.filter(r => !(r.year === year && r.month === month));
    saveLeaveRequests();
    updateRequestBadge();
    showToast('✓ 已清除 ' + month + '月假單', 'ok');
    renderCur();
  }, '清除月份假單');
}

function submitLeave() {
  const draft = S.leaveDraft;
  if (!draft || !draft.date) { showToast('請先點選日期', 'err'); return; }
  const leaveType = draft.type || '排休';
  const note = document.getElementById('leave-note')?.value?.trim() || '';
  const y = S.year, m = S.month, d = draft.date;
  const id = S.staffId;
  const dt = new Date(y, m-1, d);
  const now = new Date().toLocaleString('zh-TW', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});

  const slots = (leaveType === '排休') ? (draft.slots || {早:true,午:true,晚:true}) : {早:true,午:true,晚:true};
  const slotList = ['早','午','晚'].filter(s=>slots[s]);
  if (leaveType === '排休' && slotList.length === 0) { showToast('請至少選擇一個時段', 'err'); return; }
  const req = {
    id: id + '_' + y + m + d + '_' + Date.now(),
    empId: id, empName: S.staffName,
    year: y, month: m, date: d,
    weekday: WD[dt.getDay()],
    leaveType, slots: slotList, note, status: 'pending',
    submittedAt: now
  };
  S.leaveRequests = S.leaveRequests.filter(r => !(r.empId===id && r.year===y && r.month===m && r.date===d));
  S.leaveRequests.push(req);
  saveLeaveRequests();
  S.leaveDraft = null;
  showToast('✓ 已送出 ' + m + '/' + d + ' ' + leaveType + '申請，等待管理者審核', 'ok');
  updateRequestBadge();
  renderCur();
}

// ══════════════════════════════════════════
//  休假審核（管理者端）
// ══════════════════════════════════════════
function renderRequests() {
  const pending  = S.leaveRequests.filter(r => r.status === 'pending');
  const approved = S.leaveRequests.filter(r => r.status === 'approved');
  const rejected = S.leaveRequests.filter(r => r.status === 'rejected');

  const makeCard = (r, showBtn) => {
    const stColor = r.status==='approved'?'#007a60':r.status==='rejected'?'#cc3333':'#7a5c00';
    const stBg    = r.status==='approved'?'#d0f5ee':r.status==='rejected'?'#ffe0e0':'#fff4cc';
    const stLabel = r.status==='approved'?'✓ 已核准':r.status==='rejected'?'✗ 已拒絕':'⏳ 待審核';
    return `<div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;">
        <span style="font-size:14px;font-weight:700;">${r.empName}</span>
        <span style="font-size:12px;color:var(--text2);">${r.year}/${r.month}/${r.date}(${r.weekday})</span>
        <span style="font-size:12px;background:#e8eef8;color:#3a6ea8;padding:2px 8px;border-radius:8px;">${r.leaveType}</span>
        <span style="font-size:11px;color:${stColor};background:${stBg};padding:2px 8px;border-radius:8px;font-weight:700;margin-left:auto;">${stLabel}</span>
      </div>
      ${r.note ? `<div style="font-size:12px;color:var(--text3);margin-bottom:6px;">備註：${r.note}</div>` : ''}
      <div style="font-size:11px;color:var(--text3);">送出時間：${r.submittedAt}</div>
      ${showBtn ? `<div style="display:flex;gap:8px;margin-top:10px;">
        <button onclick="approveRequest('${r.id}')" style="flex:1;padding:7px;border:none;border-radius:8px;background:#3a6ea8;color:#fff;cursor:pointer;font-size:13px;font-weight:700;">✓ 核准</button>
        <button onclick="rejectRequest('${r.id}')"  style="flex:1;padding:7px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#cc3333;cursor:pointer;font-size:13px;">✗ 拒絕</button>
      </div>` : ''}
    </div>`;
  };

  return `
    <div class="nav-row"><div class="nav-title">📥 休假申請審核</div></div>
    <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;">
      ⏳ 待審核 <span style="background:#fff4cc;color:#7a5c00;padding:2px 8px;border-radius:8px;font-size:12px;">${pending.length} 件</span>
    </div>
    ${pending.length ? pending.map(r => makeCard(r, true)).join('') : '<div style="color:var(--text3);font-size:13px;padding:8px 0;">無待審核申請</div>'}
    ${approved.length ? `
    <div style="font-size:13px;font-weight:700;color:var(--text);margin:14px 0 8px;">✓ 已核准</div>
    ${approved.map(r => makeCard(r, false)).join('')}` : ''}
    ${rejected.length ? `
    <div style="font-size:13px;font-weight:700;color:var(--text);margin:14px 0 8px;">✗ 已拒絕</div>
    ${rejected.map(r => makeCard(r, false)).join('')}` : ''}`;
}

function approveRequest(id) {
  const req = S.leaveRequests.find(r => r.id === id);
  if (!req) return;
  req.status = 'approved';
  // 套入班表
  if (S.data && S.data.year === req.year && S.data.month === req.month) {
    const day = S.data.days.find(d => d.date === req.date);
    if (day) day.shifts[req.empId] = req.leaveType === '特休' ? '特休' : '排休';
  }
  saveLeaveRequests();
  updateRequestBadge();
  showToast('✓ 已核准 ' + req.empName + ' ' + req.month + '/' + req.date + ' ' + req.leaveType, 'ok');
  renderCur();
}

function rejectRequest(id) {
  const req = S.leaveRequests.find(r => r.id === id);
  if (!req) return;
  req.status = 'rejected';
  // 若已套入班表則還原為休
  if (S.data && S.data.year === req.year && S.data.month === req.month) {
    const day = S.data.days.find(d => d.date === req.date);
    if (day && (day.shifts[req.empId] === '排休' || day.shifts[req.empId] === '特休')) {
      day.shifts[req.empId] = '休';
    }
  }
  saveLeaveRequests();
  updateRequestBadge();
  showToast('已拒絕申請', 'ok');
  renderCur();
}


function renderReport() {
  const emps = S.data?.employees || [];
  const days = S.data?.days || [];
  const roc  = S.year - 1911;
  const m    = S.month;
  const MIN_DUTY = S.minDuty;

  if (!days.length) return `<div style="color:var(--text3);padding:24px;text-align:center;font-size:14px;">請先載入排班資料</div>`;

  // ── A. 人力不足日期 ──
  const lowDays = days.filter(day => {
    const onDuty = emps.filter(e => !isOff(day.shifts[e.id] || '休')).length;
    return onDuty < MIN_DUTY;
  });

  const lowDayRows = lowDays.length === 0
    ? `<div style="color:#007a60;font-size:14px;padding:10px 0;">✓ 本月無人力不足日</div>`
    : lowDays.map(day => {
        const onDuty = emps.filter(e => !isOff(day.shifts[e.id] || '休')).length;
        const onNames = emps.filter(e => !isOff(day.shifts[e.id] || '休')).map(e => e.name).join('、');
        const short = MIN_DUTY - onDuty;
        return `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;
            background:#fff5f5;border:1.5px solid #f5c0c0;border-radius:10px;margin-bottom:8px;flex-wrap:wrap;">
          <div style="font-size:22px;font-weight:800;color:#cc3333;min-width:40px;text-align:center;">${day.date}</div>
          <div style="font-size:12px;color:#888;min-width:18px;">(${day.weekday})</div>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:700;color:#cc3333;">缺 ${short} 人（在班 ${onDuty} 人）</div>
            <div style="font-size:12px;color:#666;margin-top:2px;">在班：${onNames || '—'}</div>
          </div>
        </div>`;
      }).join('');

  // ── B. 員工出勤節數（排太少班） ──
  const empSess = emps.map(emp => {
    const sess = days.reduce((s, day) => s + getSess(day.shifts[emp.id] || '休'), 0);
    const onDays = days.filter(day => !isOff(day.shifts[emp.id] || '休')).length;
    return { ...emp, sess, onDays };
  }).sort((a, b) => a.sess - b.sess);

  const avgSess = empSess.reduce((s, e) => s + e.sess, 0) / (empSess.length || 1);
  const lowThresh = Math.round(avgSess * 0.7); // 低於平均 70% 視為排太少

  const underEmp = empSess.filter(e => e.sess < lowThresh);

  const empRows = empSess.map(e => {
    const isLow = e.sess < lowThresh;
    const pct = Math.round(e.sess / (Math.max(...empSess.map(x=>x.sess)) || 1) * 100);
    const diff = e.sess - Math.round(avgSess);
    const diffStr = diff >= 0 ? `+${diff}` : `${diff}`;
    const barColor = isLow ? '#cc3333' : '#3a6ea8';
    const bgColor  = isLow ? '#fff5f5' : '#fff';
    const border   = isLow ? '1.5px solid #f5c0c0' : '1px solid var(--border)';
    return `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;
        background:${bgColor};border:${border};border-radius:10px;margin-bottom:6px;">
      <div style="min-width:52px;font-weight:700;font-size:13px;color:${isLow?'#cc3333':'var(--text)'};">
        ${isLow ? '⚠ ' : ''}${e.name}
      </div>
      <div style="flex:1;background:#eee;border-radius:4px;height:10px;overflow:hidden;">
        <div style="width:${pct}%;height:100%;background:${barColor};border-radius:4px;transition:width 0.3s;"></div>
      </div>
      <div style="min-width:36px;text-align:right;font-size:13px;font-weight:700;color:${isLow?'#cc3333':'var(--text)'};">${e.sess}節</div>
      <div style="min-width:36px;text-align:right;font-size:11px;font-weight:700;padding:2px 6px;border-radius:6px;
        background:${isLow?'#ffe0e0':diff<-4?'#fff4cc':'#d0f5ee'};
        color:${isLow?'#cc3333':diff<-4?'#996600':'#007a60'};">${diffStr}</div>
    </div>`;
  }).join('');

  // ── C. 特休到期 ──
  const leaveData = emps.map(emp => {
    const usedThisMonth = days.reduce((s, day) => {
      const sh = day.shifts[emp.id] || '休';
      if (sh === '特休') return s + 1;
      if (sh && sh.includes('#')) return s + 0.5;  // 舊資料相容
      return s;
    }, 0);
    const totalUsed = usedThisMonth + (emp.usedLeave || 0);
    const leaveCalc = emp.hireDate ? calcAnnualLeave(emp.hireDate) : null;
    const total = leaveCalc ? leaveCalc.days : (emp.annualLeave || 0);
    const expiry = leaveCalc ? leaveCalc.expiry : '';
    const rem = total - totalUsed;
    return { ...emp, rem, totalUsed, total, expiry };
  }).sort((a, b) => a.rem - b.rem);

  const leaveRows = leaveData.map(e => {
    const urgency = e.rem <= 3 ? 'danger' : e.rem <= 7 ? 'warn' : 'ok';
    const bgColor = urgency === 'danger' ? '#fff5f5' : urgency === 'warn' ? '#fffbea' : '#f0faf5';
    const border  = urgency === 'danger' ? '1.5px solid #f5c0c0' : urgency === 'warn' ? '1.5px solid #f0d88a' : '1px solid #b0ddc8';
    const label   = urgency === 'danger' ? '⚠ 即將到期' : urgency === 'warn' ? '注意' : '正常';
    const color   = urgency === 'danger' ? '#cc3333' : urgency === 'warn' ? '#996600' : '#007a60';
    const pct     = e.total > 0 ? Math.round(e.totalUsed / e.total * 100) : 0;
    return `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;
        background:${bgColor};border:${border};border-radius:10px;margin-bottom:6px;">
      <div style="min-width:52px;font-weight:700;font-size:13px;color:${color};">${e.name}</div>
      <div style="flex:1;background:#eee;border-radius:4px;height:10px;overflow:hidden;">
        <div style="width:${pct}%;height:100%;background:${color};border-radius:4px;"></div>
      </div>
      <div style="min-width:64px;text-align:right;font-size:12px;font-family:monospace;">
        剩 <b>${e.rem}</b>/${e.total} 天
      </div>
      <div style="font-size:11px;color:var(--text3);text-align:right;min-width:80px;">
        ${e.expiry ? '到期 ' + e.expiry : '—'}
      </div>
      <div style="min-width:44px;text-align:right;font-size:11px;font-weight:700;color:${color};">${label}</div>
    </div>`;
  }).join('');

  // ── Summary chips ──
  const chips = [
    lowDays.length > 0  ? `<div class="sum-chip red">⚠ ${lowDays.length} 天人力不足</div>` : `<div class="sum-chip green">✓ 人力充足</div>`,
    underEmp.length > 0 ? `<div class="sum-chip yellow">📉 ${underEmp.length} 人出勤偏少</div>` : `<div class="sum-chip green">⚖ 出勤均衡</div>`,
    leaveData.filter(e=>e.rem<=3).length > 0
      ? `<div class="sum-chip red">🗓 ${leaveData.filter(e=>e.rem<=3).length} 人特休即將到期</div>` : '',
  ].filter(Boolean).join('');

  return `
    <div class="nav-row">
      <div class="nav-title">排班效率報表</div>
      <div style="font-size:12px;color:var(--text3);">民國 ${roc} 年 ${m} 月</div>
    </div>

    <div class="summary-chips">${chips}</div>

    <!-- A: 人力不足 -->
    <div class="rpt-section">
      <div class="rpt-title">⚠ 人力不足日期
        ${lowDays.length > 0 ? `<span style="font-size:11px;background:#ffe0e0;color:#cc3333;padding:2px 8px;border-radius:8px;">${lowDays.length} 天</span>` : `<span style="font-size:11px;background:#d0f5ee;color:#007a60;padding:2px 8px;border-radius:8px;">0 天</span>`}
      </div>
      <div class="rpt-sub">在班人數低於門檻（${MIN_DUTY} 人）的日期</div>
      ${lowDayRows}
    </div>

    <!-- B: 出勤偏少 -->
    <div class="rpt-section">
      <div class="rpt-title">📉 員工出勤節數
        ${underEmp.length > 0 ? `<span style="font-size:11px;background:#fff4cc;color:#996600;padding:2px 8px;border-radius:8px;">${underEmp.length} 人偏少</span>` : `<span style="font-size:11px;background:#d0f5ee;color:#007a60;padding:2px 8px;border-radius:8px;">均衡</span>`}
      </div>
      <div class="rpt-sub">紅色 = 低於平均 70%（平均 ${Math.round(avgSess)} 節，門檻 ${lowThresh} 節）</div>
      ${empRows}
    </div>

    <!-- C: 特休到期 -->
    <div class="rpt-section">
      <div class="rpt-title">🗓 特休剩餘天數
        ${leaveData.filter(e=>e.rem<=3).length > 0 ? `<span style="font-size:11px;background:#ffe0e0;color:#cc3333;padding:2px 8px;border-radius:8px;">${leaveData.filter(e=>e.rem<=3).length} 人即將到期</span>` : ''}
      </div>
      <div class="rpt-sub">紅色 ≤ 3天・黃色 ≤ 7天・綠色正常</div>
      ${leaveRows}
    </div>
  `;
}

function renderStats() {
  const emps = S.data?.employees || [];
  const days = S.data?.days || [];
  const roc = S.year - 1911;

  const es = emps.map(emp => {
    let sess=0, work=0, leave=0;
    days.forEach(day => {
      const s = day.shifts[emp.id] || '休';
      sess += getSess(s);
      if (s === '特休') leave++;

      else if (!OFF_CODES.has(s)) work++;
    });
    const rem = (emp.annualLeave||0) - (emp.usedLeave||0) - leave;
    return { ...emp, sess, work, leave, rem };
  });

  const tot = es.reduce((a,e) => a+e.sess, 0);
  const avg = es.length ? (tot/es.length).toFixed(1) : 0;
  const maxS = Math.max(...es.map(e=>e.sess), 1);

  const rows = es.map(e => {
    const pct = Math.round(e.sess/maxS*100);
    const lc = e.rem > 10 ? 'lb-ok' : e.rem > 3 ? 'lb-warn' : 'lb-low';
    return `<tr>
      <td><div style="font-weight:500;">${e.name}</div>
          <div style="font-size:9px;color:var(--text3);font-family:monospace;">${e.id}</div></td>
      <td><div style="font-family:monospace;font-size:13px;font-weight:600;color:var(--accent);">${e.sess}</div>
          <div class="prog" style="width:70px;"><div class="prog-f" style="width:${pct}%"></div></div></td>
      <td style="font-family:monospace;">${e.work}</td>
      <td style="color:var(--gold);font-family:monospace;">${e.leave||'—'}</td>
      <td><span class="lb ${lc}">${e.rem} 天</span></td>
    </tr>`;
  }).join('');

  return `
    <div style="font-size:10px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;">民國 ${roc} 年 ${S.month} 月 統計</div>
    <div class="stat-grid">
      <div class="scard ac"><div class="sl">本月總節數</div><div class="sv">${tot}</div><div class="ss">全員合計</div></div>
      <div class="scard"><div class="sl">平均節數</div><div class="sv">${avg}</div><div class="ss">每人平均</div></div>
      <div class="scard"><div class="sl">排班人數</div><div class="sv">${emps.length}</div><div class="ss">人</div></div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;">
      <div style="padding:11px 16px;border-bottom:1px solid var(--border);font-size:11px;color:var(--text2);">員工出勤統計</div>
      <div style="overflow-x:auto;">
        <table class="ss-tbl">
          <thead><tr><th>員工</th><th>出勤節數</th><th>出勤天數</th><th>本月特休</th><th>特休餘額</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
    <div style="margin-top:10px;font-size:10px;color:var(--text3);">
    </div>`;
}

function openEdit(empId, empName, date, current) {
  if (S.role !== 'admin') return;
  S.editTarget = { empId, empName, date, current };
  S.editNewShift = null;

  document.getElementById('edit-title').textContent = `${empName} — ${S.month}月${date}日`;
  document.getElementById('edit-sub').innerHTML = `<div style="margin-bottom:8px;font-size:12px;color:var(--text3);">目前排班（${getSess(current)} 節）：</div>${renderSlotLarge(current)}`;
  document.getElementById('edit-warn').classList.add('hidden');
  document.getElementById('edit-save-btn').disabled = true;

  // 初始化 editSlots 並渲染選擇器
  const curSlots = parseSlots(current) || {s1:null, s2:null, s3:null};
  S.editSlots = [
    isOff(current) ? null : (curSlots.s1||null),
    isOff(current) ? null : (curSlots.s2||null),
    isOff(current) ? null : (curSlots.s3||null)

function renderSlotPicker() {
  const grid = document.getElementById('sp-grid');
  const storeNames = [...new Set(Object.values(STORES).map(s=>s.name))];

  // Layout: 店別為列（縱），早午晚為欄（橫）

  SLOTS3.forEach(slot => {

// 把早午晚店別陣列轉換成班別代碼
function slotsToCode(s1, s2, s3) {
  if (!s1 && !s2 && !s3) return '休';

  // 全天同店
  if (s1 && s1===s2 && s2===s3) {
    if (s1==='河南') return 'C';
    if (s1==='逢甲') return 'D';
    if (s1==='大雅') return 'F';
  }

  // 找各店的前綴字母
  const prefix = {'河南':'A','逢甲':'B','大雅':'E'};
  const slots = [s1,s2,s3];

  // 建立代碼：把相同前綴的連續數字合併
  let code = '';
  let curPre = null;
  slots.forEach((store, i) => {
    if (!store) return;
    const pre = prefix[store];
    if (!pre) return;
    if (pre !== curPre) {
      code += pre;
      curPre = pre;
    }
    code += (i+1).toString();
  });

  return code || '休';
}

async function doSave() {
  const { empId, empName, date, current } = S.editTarget;
  const nxt = S.editNewShift;

  // 若覆蓋已核准假單，先關確認框再執行（警示已在 openConfirm 顯示，使用者按確認即同意）
  const approvedReq = S.leaveRequests.find(r =>
    r.empId === empId && r.year === S.year && r.month === S.month &&
    r.date === date && r.status === 'approved'
  );
  if (approvedReq && !isOff(nxt)) {
    approvedReq.status = 'revoked';
    saveLeaveRequests();
  }

  closeConfirm();

  // Update local state
  const day = S.data?.days?.find(x => x.date === date);
  if (day) day.shifts[empId] = nxt;

  // ── SAFEGUARD 4: 寫入修改紀錄 ──
  const rec = {
    empId, empName, date, month: S.month, year: S.year,
    from: current, to: nxt,
    time: new Date().toLocaleString('zh-TW', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})
  };
  S.history.push(rec);
  if (S.history.length > 200) S.history = S.history.slice(-200);
  localStorage.setItem('editHistory', JSON.stringify(S.history));

  renderCur();

  // Sync to Google Sheet
  const ok = await apiSave(empId, date, nxt);
  if (ok) {
    showToast('✓ 已儲存', 'ok');
    setSyncStatus('ok', `已連線 · ${fmtTime()}`);
  } else {
    showToast(S.isDemo ? '示範模式：未同步至 Google Sheet' : '⚠ 儲存失敗，請重試', 'err');
  }
}

function loadClinics() {
  try {

    if (raw && ver === CLINICS_VERSION) return JSON.parse(raw);
  } catch(e) {}

  localStorage.setItem('clinicsConfig', JSON.stringify(DEFAULT_CLINICS));

// ── 臨時休診：localStorage key = clinicHoliday:clinicId:yyyy-m-d ──
function clinicHolidayKey(clinicId, year, month, date) {
  return `clinicHoliday:${clinicId}:${year}-${month}-${date}`;
}
function isClinicHoliday(clinicId, year, month, date) {
  try { return localStorage.getItem(clinicHolidayKey(clinicId, year, month, date)) === '1'; } catch(e) { return false; }
}
function toggleClinicHoliday(clinicId, year, month, date) {
  const key = clinicHolidayKey(clinicId, year, month, date);
  try {
    if (localStorage.getItem(key) === '1') {
      localStorage.removeItem(key);
    } else {
      localStorage.setItem(key, '1');
    }
  } catch(e) {}
}

// 取得某日（weekday 0-6）某診所的門診時段，若當天臨時休診則回傳空陣列
function getClinicSessions(clinic, weekday, year, month, date) {
  // 若有明確日期則檢查臨時休診
  if (year && month && date && isClinicHoliday(clinic.id, year, month, date)) return [];
  const matched = [];
  for (const rule of clinic.sessions) {
    if (rule.weekdays.includes(weekday)) {
      matched.push(...rule.slots);
    }
  }
  return [...new Set(matched)];
}

// 取得某日、某藥局、某時段的在班人員名單
function getStaffInSlot(dayData, emps, storeName, slotIndex) {
  if (!dayData) return [];
  return emps.filter(emp => {
    const s = dayData.shifts[emp.id] || '休';
    if (isOff(s)) return false;
    const p = parseSlots(s);
    return p && [p.s1, p.s2, p.s3][slotIndex] === storeName;
  }).map(e => e.name);
}
const SLOT_IDX = { '早':0, '午':1, '晚':2 };

// ── 診所門診面板 HTML（月班表用）──
function renderClinicPanel(isAdmin) {
  if (!window.CLINICS || window.CLINICS.length === 0) return '';
  const isOpen = S.clinicPanelOpen === true; // 預設收合

  const WD_LABELS = ['日','一','二','三','四','五','六'];
  const ALL_SLOTS = ['早','午','晚'];
  const { year:y, month:m } = S;
  const days = S.data?.days || [];
  const emps = S.data?.employees || [];

  const clinicRows = window.CLINICS.map(clinic => {
    // 針對本月每一天，找出門診日及人力情況
    const dim = new Date(y, m, 0).getDate();
    let alertDays = []; // 人力不足的門診日

    for (let d = 1; d <= dim; d++) {
      const dt = new Date(y, m-1, d);
      const wd = dt.getDay();
      const sessions = getClinicSessions(clinic, wd, y, m, d);
      if (sessions.length === 0) continue;
      const dd = days.find(x => x.date === d);
      let hasShortage = false;
      for (const slot of sessions) {
        const staff = getStaffInSlot(dd, emps, clinic.partnerStore, SLOT_IDX[slot]);
        if (staff.length < 1) hasShortage = true;
      }
      if (hasShortage) alertDays.push(`${m}/${d}（${WD_LABELS[wd]}）`);
    }

    // 門診時段摘要（以週為單位展示）
    const sessionSummary = (() => {
      const wdRules = ALL_SLOTS.map(slot => {
        const onWkdays = [1,2,3,4,5].filter(wd => getClinicSessions(clinic, wd).includes(slot));
        const onWkend  = [0,6].filter(wd => getClinicSessions(clinic, wd).includes(slot));
        return { slot, onWkdays, onWkend };
      }).filter(r => r.onWkdays.length || r.onWkend.length);

      return sessionSummary_html(sessionRules_compact(clinic), clinic);
    })();

    const stObj = Object.values(STORES).find(x => x.name === clinic.partnerStore);
    const stColor = stObj?.color || '#666';

    const alertHtml = alertDays.length > 0
      ? `<div class="clinic-alert danger">⚠ 門診日人力不足（無對應時段人員）：${alertDays.slice(0,5).join('、')}${alertDays.length>5?'…等':''}，請確認排班</div>`

    return `

  const settingsBtn = isAdmin

  return `

// 將診所門診規則轉為緊湊的時段區塊 HTML
function sessionRules_compact(clinic) {
  // Return array of {label, slots}
  const rules = [];
  for (const rule of clinic.sessions) {
    const wdLabel = formatWdGroup(rule.weekdays);
    rules.push({ label: wdLabel, slots: rule.slots, isWkend: rule.weekdays.some(d=>d===0||d===6) });
  }
  return rules;
}

function sessionSummary_html(rules, clinic) {
  const timeLbls = {}; // 不顯示時間
  // 取對應藥局的顏色
  const stObj   = Object.values(STORES).find(x => x.name === clinic.partnerStore);
  const stColor  = stObj?.color  || clinic.color;
  const stBg     = stObj?.bg     || '#f5f5f5';
  const stBorder = stObj?.border || clinic.border;

  const rows = rules.map(r => {
    const slotChips = r.slots.map(s => {
      const timeStr = timeLbls[s] || '';
      return `<div style="display:inline-flex;flex-direction:column;align-items:center;
          background:${stBg};border:1.5px solid ${stBorder};
          border-radius:7px;padding:4px 14px;min-width:76px;">
        <span style="font-size:12px;font-weight:700;color:${stColor};">${s}診</span>
        ${timeStr ? `<span style="font-size:10px;color:${stColor};opacity:0.7;font-family:'DM Mono',monospace;margin-top:1px;">${timeStr}</span>` : ''}
      </div>`;
    }).join('');

    return `<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;
        padding:7px 10px;border-radius:8px;background:#fff;
        border:1px solid ${stBorder};margin-bottom:5px;">
      <span style="font-size:12px;font-weight:700;color:#556;min-width:70px;white-space:nowrap;">
        週${r.label}
      </span>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">${slotChips}</div>
    </div>`;
  }).join('');
  return `<div style="margin-bottom:8px;">${rows}</div>`;
}

function formatWdGroup(wds) {
  const labels = ['日','一','二','三','四','五','六'];
  const sorted = [...wds].sort((a,b)=>a-b);
  if (sorted.join(',') === '1,2,3,4,5') return '一至五';
  if (sorted.join(',') === '0,1,2,4,5') return '一、二、四、五、日';
  if (sorted.join(',') === '0,6')        return '六、日';
  if (sorted.join(',') === '3,4,6')      return '三、四、六';
  if (sorted.join(',') === '2,5')        return '二、五';
  return sorted.map(d => labels[d]).join('、');
}

// ══ 診所設定 Modal ══
function openClinicSettings() {
  const clinics = window.CLINICS;
  const WD_NAMES = ['日','一','二','三','四','五','六'];
  const ALL_SLOTS = ['早','午','晚'];
  const storeNames = [...new Set(Object.values(STORES).map(s=>s.name))];

  const clinicForms = clinics.map((c, ci) => {
    // Build weekday+slot matrix
    // For each slot, which weekdays are checked
    const slotWdMap = {};
    ALL_SLOTS.forEach(sl => { slotWdMap[sl] = new Set(); });
    for (const rule of c.sessions) {
      for (const sl of rule.slots) {
        for (const wd of rule.weekdays) {
          slotWdMap[sl].add(wd);
        }
      }
    }

    const storeOpts = storeNames.map(n => `<option value="${n}" ${c.partnerStore===n?'selected':''}>${n}店</option>`).join('');

    const slotRows = ALL_SLOTS.map(sl => {
      const wdBtns = [0,1,2,3,4,5,6].map(wd =>
        `<button type="button" class="clinic-wd-btn ${slotWdMap[sl].has(wd)?'sel':''}"
          onclick="toggleClinicWd(${ci},'${sl}',${wd},this)">${WD_NAMES[wd]}</button>`
      ).join('');
      return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
        <span style="font-size:12px;font-weight:700;color:#557;min-width:28px;">${sl}診</span>
        <div style="display:flex;gap:4px;">${wdBtns}</div>
      </div>`;
    }).join('');

    return `
    <div style="background:${c.bg};border:1.5px solid ${c.border};border-radius:10px;padding:14px;margin-bottom:14px;">
      <div style="font-size:14px;font-weight:700;color:${c.color};margin-bottom:10px;">🏥 ${c.name}</div>
      <div class="clinic-mo-row">
        <span class="clinic-mo-label">診所名稱</span>
        <input class="clinic-mo-input" id="cn-name-${ci}" value="${c.name}" placeholder="診所名稱"/>
      </div>
      <div class="clinic-mo-row">
        <span class="clinic-mo-label">對應藥局</span>
        <select class="clinic-mo-input" id="cn-store-${ci}">${storeOpts}</select>
      </div>
      <div style="font-size:12px;font-weight:700;color:#557;margin:8px 0 4px;">門診時段（勾選有門診的日期）</div>
      ${slotRows}
    </div>`;
  }).join('');

  const html = `<div class="mbox" style="max-width:520px;">
    <h3 style="margin-bottom:4px;">🏥 合作診所設定</h3>
    <div class="msub">設定診所名稱、對應藥局及每週門診時段，管理者排班時將自動對照。</div>
    ${clinicForms}
    <div class="mac">
      <button class="btn-c" onclick="closeClinicModal()">取消</button>
      <button class="btn-ok admin-btn" onclick="saveClinicSettings()">儲存設定</button>
    </div>
  </div>`;
  const mo = document.getElementById('mo-clinic');
  mo.innerHTML = html;
  mo.style.display = 'flex';
}

// 動態切換門診日設定
function toggleClinicWd(ci, slot, wd, btn) {
  btn.classList.toggle('sel');
  // 更新 window.CLINICS 暫存（不立即 save，等儲存再寫入）
  const c = window.CLINICS[ci];
  // 找有無該 slot 的 rule；若無則建立
  let rule = c.sessions.find(r => r.slots.length === 1 && r.slots[0] === slot);
  if (!rule) {
    rule = { weekdays:[], slots:[slot] };
    c.sessions.push(rule);
  }
  if (btn.classList.contains('sel')) {
    if (!rule.weekdays.includes(wd)) rule.weekdays.push(wd);
  } else {
    rule.weekdays = rule.weekdays.filter(d => d !== wd);
  }
}

function saveClinicSettings() {
  const clinics = window.CLINICS;
  clinics.forEach((c, ci) => {
    const nameEl  = document.getElementById(`cn-name-${ci}`);
    const storeEl = document.getElementById(`cn-store-${ci}`);
    if (nameEl)  c.name  = nameEl.value.trim() || c.name;
    if (storeEl) c.partnerStore = storeEl.value;
    c.sessions = c.sessions.filter(r => r.weekdays.length > 0 && r.slots.length > 0);
  });
  saveClinics(clinics);
  closeClinicModal();
  showToast('診所設定已儲存', 'ok');
  renderCur();
}

function closeClinicModal() {
  const mo = document.getElementById('mo-clinic');
  if (mo) mo.style.display = 'none';
}

function loadStores() {
  try {
    const raw = localStorage.getItem('dynamicStores');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  // 預設從 STORES 常數產生
  const seen = {}, result = [];
  Object.values(STORES).forEach(s => {
    if (!seen[s.name]) {
      seen[s.name] = true;
      result.push({ name: s.name, color: s.color, bg: s.bg, border: s.border, active: true });
    }
  });
  return result;
}
function saveStores(list) {
  try { localStorage.setItem('dynamicStores', JSON.stringify(list)); } catch(e) {}
  window.DYNAMIC_STORES = list;
  saveStoresToGSheet(list);
}
if (!window.DYNAMIC_STORES) window.DYNAMIC_STORES = loadStores();

// ── 儲存員工設定 ──
function saveEmpSettings() {
  const oldEmps = getCurrentEmps();
  const newEmps = oldEmps.map((emp, idx) => {
    const nameEl = document.getElementById(`emp-name-${idx}`);
    const idEl   = document.getElementById(`emp-id-${idx}`);
    const actEl  = document.getElementById(`emp-active-${idx}`);
    const name   = nameEl ? nameEl.value.trim() : emp.name;
    const id     = idEl   ? idEl.value.trim()   : emp.id;
    const active = actEl  ? actEl.checked        : true;
    // 分店權限
    const storeBtns = document.querySelectorAll(`[data-emp="${emp.id}"]`);
    const stores = [];
    storeBtns.forEach(btn => { if (btn.dataset.active === 'true') stores.push(btn.dataset.store); });
    const canLeave   = document.getElementById(`rl-leave-${emp.id}`)?.checked ?? true;
    const canSchedit = document.getElementById(`rl-schedit-${emp.id}`)?.checked ?? false;
    window.STAFF_ROLES[id] = { stores: stores.length ? stores : getActiveStoreNames(), canLeave, canSchedit };
    const hireEl   = document.getElementById(`emp-hire-${idx}`);
    const resignEl = document.getElementById(`emp-resign-${idx}`);
    const hireDate   = hireEl   ? hireEl.value   : (emp.hireDate   || '');
    const resignDate = resignEl ? resignEl.value : (emp.resignDate || '');
    // 自動計算特休天數
    const leaveCalc = calcAnnualLeave(hireDate);
    const annualLeave = hireDate ? leaveCalc.days : (emp.annualLeave || 14);
    return { ...emp, name, id, active, annualLeave, usedLeave: emp.usedLeave || 0, hireDate, resignDate };
  });

  // 收集新員工（動態插入的列）
  document.querySelectorAll('[data-new-emp-idx]').forEach(container => {
    const i = container.dataset.newEmpIdx;
    const name = document.getElementById(`new-emp-name-${i}`)?.value.trim();
    const id   = document.getElementById(`new-emp-id-${i}`)?.value.trim();
    if (!name || !id) return;
    const storeBtns = container.querySelectorAll(`[data-store]`);
    const stores = [];
    storeBtns.forEach(btn => { if (btn.dataset.active === 'true') stores.push(btn.dataset.store); });
    const canLeave   = document.getElementById(`new-rl-leave-${i}`)?.checked ?? true;
    const canSchedit = document.getElementById(`new-rl-schedit-${i}`)?.checked ?? false;
    const pw       = document.getElementById(`new-emp-pw-${i}`)?.value.trim() || id;
    const hireDate = document.getElementById(`new-emp-hire-${i}`)?.value || '';
    window.STAFF_ROLES[id] = { stores: stores.length ? stores : getActiveStoreNames(), canLeave, canSchedit };
    const pwds = window.STAFF_PASSWORDS || {};
    pwds[id] = pw;
    window.STAFF_PASSWORDS = pwds;
    savePasswords(pwds);
    const newEmpLeave = calcAnnualLeave(hireDate);
    newEmps.push({ id, name, active: true, annualLeave: newEmpLeave.days || 14, usedLeave: 0,
      hireDate, resignDate: '' });
  });

  window.DYNAMIC_EMPS = newEmps;
  saveDynamicEmps(newEmps);
  saveStaffRoles(window.STAFF_ROLES);

  // 更新 S.data.employees（當月立即生效）
  if (S.data) {
    S.data.employees = newEmps.filter(e => e.active !== false);
    // 確保每天 shifts 都有所有員工的欄位（新員工預設「休」）
    const activeIds = S.data.employees.map(e => e.id);
    S.data.days.forEach(day => {
      activeIds.forEach(eid => { if (day.shifts[eid] === undefined) day.shifts[eid] = '休'; });
      // 停用或刪除的員工不刪歷史資料，保留原本的班別
    });
  }

  closeRoleModal();
  showToast('✓ 員工設定已儲存', 'ok');
  renderCur();
}

// ── 儲存店別設定 ──
function saveStoreSettings() {
  const oldStores = window.DYNAMIC_STORES || [];
  const newStores = oldStores.map((s, idx) => {
    const nameEl   = document.getElementById(`store-name-${idx}`);
    const colorEl  = document.getElementById(`store-color-${idx}`);
    const activeEl = document.getElementById(`store-active-${idx}`);
    const name   = nameEl   ? nameEl.value.trim()   : s.name;
    const color  = colorEl  ? colorEl.value         : s.color;
    const active = activeEl ? activeEl.checked       : true;
    // 從 color 自動推算 bg/border
    const bg     = color + '22';
    const border = color + '88';
    return { name, color, bg, border, active };
  });

  // 收集新店別
  document.querySelectorAll('[data-new-store-idx]').forEach(container => {
    const i = container.dataset.newStoreIdx;
    const name  = document.getElementById(`new-store-name-${i}`)?.value.trim();
    const color = document.getElementById(`new-store-color-${i}`)?.value || '#3a9a6a';
    if (!name) return;
    newStores.push({ name, color, bg: color + '22', border: color + '88', active: true });
  });

  window.DYNAMIC_STORES = newStores;
  saveStores(newStores);

  // 更新 STORES 常數（動態注入）
  _rebuildStores(newStores);

  closeRoleModal();
  showToast('✓ 店別設定已儲存，重新整理後完整生效', 'ok');
  renderCur();
}

// 動態重建 STORES 物件（A/B/C... 對應店名）
function _rebuildStores(storeList) {
  const active = storeList.filter(s => s.active !== false);
  const codes = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  active.forEach((s, i) => {
    const code1 = codes[i * 2];
    const code2 = codes[i * 2 + 1];
    if (code1) STORES[code1] = { name: s.name, color: s.color, bg: s.bg || s.color+'22', border: s.border || s.color+'88' };
    if (code2) STORES[code2] = { name: s.name, color: s.color, bg: s.bg || s.color+'22', border: s.border || s.color+'88' };
  });
}

function shiftLabel(s) {
  if (!s || s === '—') return '—';
  const clean = s.replace('#','').trim();
  const label = SHIFT_DISPLAY[clean] || SHIFT_DISPLAY[s] || s;
  return label;
}


function getStoreLetters(s) {
  // Extract unique store letters from a code like A12E3 → ['A','E']
  const letters = [];
  for (const ch of s) {
    if (['A','B','C','D','E','F'].includes(ch) && !letters.includes(ch)) {
      letters.push(ch);
    }
  }
  return letters;
}

function scClass(s) {
  if (!s || isOff(s) || s==='—') return 'sc-rest';
  if (s==='特休'||s==='公休') return 'sc-sp';
  return SC_CLASS[s[0]] || 'sc-rest';
}

// Returns inline style string for multi-store gradient chips
function scStyle(s) {
  if (!s || isOff(s) || s==='—') return '';
  if (s==='特休'||s==='公休') return '';
  const letters = getStoreLetters(s);
  if (letters.length <= 1) return ''; // single store → use CSS class as-is
  // Multi-store: build gradient
  const colors = letters.map(l => STORE_COLORS[l] || '#888');
  const bgs    = letters.map(l => STORE_BG[l]    || '#eee');
  const pct = 100 / colors.length;
  // Text color: first store
  const textCol = colors[0];
  // Background gradient
  const bgParts = bgs.map((bg, i) => `${bg} ${Math.round(i*pct)}%, ${bg} ${Math.round((i+1)*pct)}%`).join(', ');
  const borderParts = colors.map((c,i) => i===0 ? c : null).filter(Boolean)[0];
  return `background:linear-gradient(90deg,${bgParts});border:1.5px solid ${borderParts};color:${textCol};`;
}

function shiftColor(s) {
  // A,C = 河南店(藍) / B,D = 逢甲店(紅) / E,F = 大雅店(紫)
  const m = {'A':'#0066cc','C':'#0066cc','B':'#cc3333','D':'#cc3333','E':'#6622bb','F':'#6622bb'};
  return m[s?.[0]] || 'var(--text3)';
}

  bar.className = 'sync-bar ' + (status==='ok'?'ok':status==='err'?'err':'offline');
  document.getElementById('sync-txt').textContent = text;
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  setTimeout(() => t.className = '', 2800);
}

function fmtTime() {
  return new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});
}

// ── 發布班表：通知所有員工 ──
function publishSchedule() {
  const y = S.year, m = S.month;
  const roc = y - 1911;
  const emps = S.data?.employees || [];

  showConfirm('確定發布民國 ' + roc + ' 年 ' + m + ' 月班表？\n\n發布後員工將收到通知，且班表將標示為「已發布」。', function() {
    _doPublishSchedule(y, m, roc, emps);
  }, '發布班表');
}
function _doPublishSchedule(y, m, roc, emps) {
  // 記錄發布
  const pubKey = y + '-' + m;
  S.publishedSchedules[pubKey] = Date.now();
  try { localStorage.setItem('publishedSchedules', JSON.stringify(S.publishedSchedules)); } catch(e) {}

  // 給每位員工新增通知
  emps.forEach(emp => {
    if (!S.notifications[emp.id]) S.notifications[emp.id] = [];
    // 移除同月舊通知，避免重複
    S.notifications[emp.id] = S.notifications[emp.id].filter(n => !(n.year === y && n.month === m));
    S.notifications[emp.id].push({
      year: y, month: m,
      message: '民國 ' + roc + ' 年 ' + m + ' 月班表已發布，請至「月班表」查看。',
      createdAt: Date.now(),
      readAt: null,
    });
  });
  try { localStorage.setItem('notifications', JSON.stringify(S.notifications)); } catch(e) {}

  showToast('📢 已發布 ' + roc + '年' + m + '月班表，' + emps.length + ' 位員工已收到通知', 'ok');
  renderCur();
}

// ── 員工「我的通知」列表（在月班表頁頂部顯示） ──
function getMyUnreadNotifs() {
  if (!S.staffId) return [];
  return (S.notifications[S.staffId] || []).filter(n => !n.readAt);
}

function syncMonthScroll(el) {
  // no-op: single table now handles scroll natively
}
function syncMonthColWidths() {
  // no-op: single table now handles col widths natively
}

function markNotifsRead() {
  if (!S.staffId) return;
  const notifs = S.notifications[S.staffId] || [];
  notifs.forEach(n => { if (!n.readAt) n.readAt = Date.now(); });
  S.notifications[S.staffId] = notifs;
  localStorage.setItem('notifications', JSON.stringify(S.notifications));
  updateRequestBadge();
  renderCur();
}

// Auto-refresh every 5 minutes
setInterval(() => {
  if (S.role && !S.isDemo && S.apiUrl) loadData().then(renderCur);
}, 5 * 60 * 1000);

function switchToMonth(year, month) {
  S.year = year; S.month = month;
  if (S.apiUrl && !S.isDemo) { loadData().then(renderCur); }
  else { loadDemo(); renderCur(); }
}
</script>

<!--
════════════════════════════════════════════
  Google Apps Script 程式碼
  Google Sheet → 擴充功能 → Apps Script → 貼入以下內容
  部署 → 新增部署作業 → 網頁應用程式
  執行身份：我（自己）/ 存取對象：所有人
  複製部署後的「網頁應用程式網址」貼入系統設定
════════════════════════════════════════════

function doGet(e)  { return handle(e, false); }
function doPost(e) { return handle(e, true);  }

function handle(e, isPost) {
  const p = isPost ? JSON.parse(e.postData.contents) : e.parameter;
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  let result = {};

  if (p.action === 'getSchedule') {
    const y = parseInt(p.year), m = parseInt(p.month);
    const sheetName = (y - 1911) + '-' + m + '月';
    const sheet = ss.getSheetByName(sheetName);
    if (!sheet) {
      result = { error: '找不到工作表：' + sheetName };
    } else {
      const data = sheet.getDataRange().getValues();
      const empIds   = data[4].slice(2, 13).map(String);
      const empNames = data[5].slice(2, 13).map(String);
      const employees = empIds.map((id, i) => ({
        id, name: empNames[i], annualLeave: 30, usedLeave: 0
      }));
      const WD = ['日','一','二','三','四','五','六'];
      const days = [];
      for (let r = 6; r < data.length; r++) {
        const row = data[r];
        if (!(row[0] instanceof Date)) continue;
        const dt = new Date(row[0]);
        if (dt.getMonth() + 1 !== m) continue;
        const shifts = {};
        employees.forEach((emp, i) => {
          shifts[emp.id] = String(row[2 + i] || '休');
        });
        days.push({
          date: dt.getDate(),
          weekday: String(row[1] || WD[dt.getDay()]),
          shifts
        });
      }
      result = { year: y, month: m, employees, days };
    }
  }

  if (p.action === 'setShift') {
    const y = parseInt(p.year), m = parseInt(p.month);
    const sheetName = (y - 1911) + '-' + m + '月';
    const sheet = ss.getSheetByName(sheetName);
    if (!sheet) {
      result = { success: false, error: '找不到工作表' };
    } else {
      const data   = sheet.getDataRange().getValues();
      const empIds = data[4].slice(2, 13).map(String);
      const col    = empIds.indexOf(String(p.empId));
      if (col < 0) {
        result = { success: false, error: '找不到員工' };
      } else {
        const target = parseInt(p.date);
        let saved = false;
        for (let r = 6; r < data.length; r++) {
          if (!(data[r][0] instanceof Date)) continue;
          const dt = new Date(data[r][0]);
          if (dt.getDate() === target && dt.getMonth() + 1 === m) {
            sheet.getRange(r + 1, 3 + col).setValue(p.shift);
            saved = true; break;
          }
        }
        result = saved
          ? { success: true }
          : { success: false, error: '找不到日期' };
      }
    }
  }

  return ContentService
    .createTextOutput(JSON.stringify(result))
    .setMimeType(ContentService.MimeType.JSON);
}
